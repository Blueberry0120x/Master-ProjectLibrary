name: Mirror to ParcelDashboard (public)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Master-ProjectLibrary
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Strip internal dev files only (keep real data)
        run: |
          rm -rf .claude/ .vscode/ .github/
          rm -f  .env .env.*
          # Remove MPL-branded landing files — public mirror serves ParcelDashboard, not MPL
          rm -f README.md CLAUDE.md

      - name: Transform app/docs/ for static hosting (fix cross-links)
        run: |
          python3 << 'PYEOF'
          import pathlib

          # Dark mode is baked into source files — only cross-links need fixing here
          fixes = {
              'app/docs/InteractiveMap.html':   [('href="checklist"', 'href="PreApp_Checklist.html"')],
              'app/docs/PreApp_Checklist.html':  [('href="/"', 'href="InteractiveMap.html"')],
          }
          for fname, replacements in fixes.items():
              p = pathlib.Path(fname)
              if not p.exists():
                  print(f"SKIP (not found): {fname}")
                  continue
              html = p.read_text(encoding='utf-8')
              for old, new in replacements:
                  html = html.replace(old, new)
              p.write_text(html, encoding='utf-8')

          print("Transformed HTML files: cross-links fixed")
          PYEOF

      - name: Write ParcelDashboard landing (root index.html + README)
        run: |
          cat > index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=app/docs/InteractiveMap.html">
            <title>ParcelDashboard</title>
            <style>
              body { font-family: system-ui, sans-serif; background:#0d1117; color:#c9d1d9;
                     display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
              a { color:#58a6ff; }
            </style>
          </head>
          <body>
            <p>Loading <a href="app/docs/InteractiveMap.html">ParcelDashboard &rarr; InteractiveMap</a>&hellip;</p>
          </body>
          </html>
          HTML

          cat > README.md <<'MD'
          # ParcelDashboard (public mirror)

          Public, sanitized mirror of the Master-ProjectLibrary site planning + permit prep stack.

          - Live viewer: [app/docs/InteractiveMap.html](app/docs/InteractiveMap.html)
          - Pre-app checklist: [app/docs/PreApp_Checklist.html](app/docs/PreApp_Checklist.html)
          - Architecture overview: [app/docs/architecture.html](app/docs/architecture.html)

          Source: private `Master-ProjectLibrary` repo. This branch is force-pushed by the
          mirror workflow on every `main` update. Do not commit here directly — changes
          will be overwritten on the next mirror run.
          MD

      - name: Commit mirror snapshot
        run: |
          git config user.name "mirror-bot"
          git config user.email "mirror-bot@users.noreply.github.com"
          git add -A
          git commit -m "Mirror from Master-ProjectLibrary (real data, dark mode, links fixed, responsive)" --allow-empty

      - name: Force-push to ParcelDashboard gh-pages
        run: |
          git push --force https://x-access-token:${MIRROR_TOKEN}@github.com/Blueberry0120x/ParcelDashboard.git HEAD:gh-pages
        env:
          MIRROR_TOKEN: ${{ secrets.PUBLIC_MIRROR_PAT }}
