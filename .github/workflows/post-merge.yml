name: Post-Merge Pipeline (rebuild + deploy + notify)

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  post-merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PUBLIC_MIRROR_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild Output HTML
        run: python tools/build.py

      - name: Check for Output changes
        id: check
        run: |
          if git diff --quiet Output/ app/docs/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit rebuilt Output
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "merge-bot"
          git config user.email "merge-bot@users.noreply.github.com"
          git add Output/ app/docs/
          git commit -m "build: auto-rebuild Output after PR #${{ github.event.pull_request.number }} merge"
          git push

      - name: Notify via GitHub (mobile push)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = [
              `## Merged & Deployed`,
              `**PR #${pr.number}:** ${pr.title}`,
              `**Branch:** \`${pr.head.ref}\` -> \`main\``,
              `**Commits:** ${pr.commits}`,
              ``,
              `Auto-rebuild: ${{ steps.check.outputs.changed == 'true' && 'Output rebuilt and committed' || 'No changes needed' }}`,
              `Mirror to ParcelDashboard: triggered (separate workflow)`,
              ``,
              `> Merged at ${new Date().toISOString()}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body
            });
